ksp {
    arg("room.schemaLocation", "$projectDir/schemas")
}

def appVersionName = providers.gradleProperty("VERSION_NAME")
        .orElse(providers.environmentVariable("VERSION_NAME"))
        .getOrElse("Nightly")

def coldClientVersionFile = rootProject.file("tools/gbe_fork.version")
def coldClientVersion = coldClientVersionFile.exists() ? coldClientVersionFile.text.trim() : "unknown"

android {
    namespace 'com.winlator.cmod'
    compileSdk 35

    defaultConfig {
        applicationId "com.winnative.cmod"
        minSdk 26
        targetSdk 28
        versionCode 2
        versionName appVersionName

        externalNativeBuild {
            cmake {
                cppFlags ''
                arguments "-DCMAKE_SHARED_LINKER_FLAGS=-Wl,-z,max-page-size=16384",
                          "-DCMAKE_EXE_LINKER_FLAGS=-Wl,-z,max-page-size=16384",
                          "-DANDROID_STL=c++_shared"
            }
        }

        ndk {
            abiFilters 'arm64-v8a'
        }

        resConfigs "en", "da", "de", "es", "fr", "hi", "it", "ko", "pl", "pt-rBR", "ro", "ru", "uk", "zh-rCN", "zh-rTW"

        buildConfigField("String", "COLD_CLIENT_VERSION", "\"${coldClientVersion}\"")
    }

    androidResources {
        noCompress += ['tzst', 'txz']
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    signingConfigs {
        release {
            def props = new Properties()
            def propsFile = rootProject.file('signing.properties')
            if (propsFile.exists()) {
                props.load(new FileInputStream(propsFile))
            }

            def ksFile = System.getenv("KEYSTORE_FILE") ?: props.getProperty("storeFile", "")
            if (ksFile != null && !ksFile.isEmpty()) {
                storeFile rootProject.file(ksFile)
            }
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: props.getProperty("storePassword", "")
            keyAlias System.getenv("KEY_ALIAS") ?: props.getProperty("keyAlias", "")
            keyPassword System.getenv("KEY_PASSWORD") ?: props.getProperty("keyPassword", "")
        }
    }

    buildTypes {
        debug {
            minifyEnabled false
            proguardFiles 'proguard-rules.pro'
            // Prefer release signing when configured.
            signingConfig signingConfigs.release.storeFile != null ? signingConfigs.release : signingConfigs.debug
        }
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                          'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }

    flavorDimensions "branding"

    productFlavors {
        standard {
            dimension "branding"
            applicationId "com.winnative.cmod"
        }
        ludashi {
            dimension "branding"
            applicationId "com.ludashi.benchmark"
        }
        pubg {
            dimension "branding"
            applicationId "com.tencent.ig"
        }
    }

    ndkVersion '27.3.13750724'

    externalNativeBuild {
        cmake {
            path 'src/main/cpp/CMakeLists.txt'
        }
    }

    packagingOptions {
        resources {
            excludes += "/DebugProbesKt.bin"
            excludes += "META-INF/versions/9/OSGI-INF/MANIFEST.MF"
        }
        jniLibs {
            // PulseAudio runs libpulseaudio.so directly from nativeLibraryDir and loads
            // libpulse*/libltdl/libsndfile as its dependencies, so these must be packaged
            // and extracted to disk (useLegacyPackaging) rather than excluded.
            useLegacyPackaging = true
        }
    }

    buildFeatures {
        compose true
        viewBinding true
        buildConfig true
        prefab true   // native Steam/runtime components link OpenSSL + curl via NDK Prefab AARs
    }

    sourceSets {
        main {
            java.srcDirs = [
                    'src/main/app',
                    'src/main/feature',
                    'src/main/sharedmemory',
                    'src/main/runtime',
                    'src/main/shared'
            ]
        }
    }

    applicationVariants.configureEach { variant ->
        if (variant.buildType.name == "debug") {
/*
            tasks.named("pre${variant.name.capitalize()}Build").configure {
                dependsOn installVulkanValidationLayer
            }
*/
            variant.outputs.configureEach { output ->
                output.outputFileName = "${variant.flavorName}.apk"
            }
        }
    }
}

